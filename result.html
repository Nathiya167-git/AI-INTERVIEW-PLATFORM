<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Interview Result</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <style>
      /* ===========================
   RESULT PAGE
=========================== */

      body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f2f5fa;
      }

      /* Result Container */

      .result-container {
        width: 75%;
        margin: 40px auto;
        background: #fff;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
      }

      /* Heading */

      .result-container h1 {
        text-align: center;
        margin-bottom: 35px;
        color: #222;
      }

      /* Grid */

      .result-box {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }

      /* Cards */

      .result-card {
        background: #f7f9fc;
        padding: 25px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .result-card h3 {
        margin-bottom: 10px;
        color: #555;
      }

      .result-card h2 {
        color: #222;
      }

      /* Score */

      .score {
        font-size: 60px;
        font-weight: bold;
        color: #0066ff;
      }

      /* Progress */

      .progress {
        width: 100%;
        height: 25px;
        background: #ddd;
        border-radius: 20px;
        overflow: hidden;
        margin-top: 35px;
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background: #28a745;
        transition: 1s;
      }

      /* Feedback */

      .feedback {
        margin-top: 35px;
        background: #eef5ff;
        padding: 25px;
        border-radius: 12px;
        line-height: 28px;
      }

      .feedback h2 {
        margin-top: 0;
        color: #0066ff;
      }

      /* Buttons */

      .result-buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 35px;
        flex-wrap: wrap;
      }

      .result-buttons button {
        padding: 12px 25px;
        border: none;
        border-radius: 8px;
        background: #0066ff;
        color: white;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }

      .result-buttons button:hover {
        background: #004fd1;
      }

      /* Navbar */

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background: #0066ff;
        color: white;
      }

      .logo {
        font-size: 22px;
        font-weight: bold;
      }

      /* Footer */

      footer {
        text-align: center;
        padding: 20px;
        background: #0066ff;
        color: white;
        margin-top: 40px;
      }

      /* Mobile */

      @media (max-width: 800px) {
        .result-container {
          width: 90%;
          padding: 20px;
        }

        .result-box {
          grid-template-columns: 1fr;
        }

        .score {
          font-size: 45px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <nav class="navbar">
        <div class="logo">
          <i class="fa-solid fa-robot"></i>

          AI Interview Platform
        </div>
      </nav>
    </header>

    <div class="result-container">
      <h1>Interview Result</h1>

      <div class="result-box">
        <div class="result-card">
          <h3>Candidate</h3>

          <h2 id="candidateName">Candidate</h2>
        </div>

        <div class="result-card">
          <h3>Domain</h3>

          <h2 id="domainName">Java</h2>
        </div>

        <div class="result-card">
          <h3>Questions Answered</h3>

          <h2 id="answered">10 / 10</h2>
        </div>

        <div class="result-card">
          <h3>Score</h3>

          <div class="score" id="score">0%</div>
        </div>
      </div>

      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="feedback">
        <h2>AI Feedback</h2>

        <p id="feedback">Waiting...</p>
      </div>

      <div class="result-buttons">
        <button onclick="downloadReport()">
          <i class="fa-solid fa-download"></i>

          Download Report
        </button>

        <button onclick="window.location.href = '/candidate'">Dashboard</button>
      </div>
    </div>

    <footer>
      <p>© 2026 AI Interview Platform</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
