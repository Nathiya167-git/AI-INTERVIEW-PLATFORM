<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>My Profile</title>

    <!-- CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <!-- ================= NAVBAR ================= -->

    <header>
      <nav class="navbar">
        <div class="logo">
          <i class="fa-solid fa-user"></i>

          My Profile
        </div>

        <ul class="nav-links">
          <li>
            <a href="{{ url_for('candidate') }}"> Dashboard </a>
          </li>

          <li>
            <a href="{{ url_for('logout') }}"> Logout </a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- ================= PROFILE ================= -->

    <section class="profile-section">
      <div class="profile-card">
        <!-- Profile Image -->

        <img
          src="{{ url_for('static', filename='images/profile.png') }}"
          alt="Profile"
          width="150"
        />

        <!-- Username -->

        <h2>{{ user.username }}</h2>

        <p>Candidate</p>

        <hr />

        <div class="profile-details">
          <p>
            <strong>Name :</strong>
            {{ user.username }}
          </p>

          <p>
            <strong>Email :</strong>
            {{ session['user'] }}
          </p>

          <p>
            <strong>Role :</strong>
            Candidate
          </p>

          <p>
            <strong>Interview Domain :</strong>
            Java
          </p>

          <p>
            <strong>Experience :</strong>
            Fresher
          </p>
        </div>

        <button>Edit Profile</button>
      </div>
    </section>

    <!-- ================= FOOTER ================= -->

    <footer>
      <p>© 2026 AI Interview Platform</p>
    </footer>

    <!-- JavaScript -->

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
