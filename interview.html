<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AI Interview</title>

    <!-- CSS -->

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <!-- Font Awesome -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <!-- Interview Page CSS -->

    <style>
      .interview-container {
        width: 90%;
        margin: 40px auto;

        display: grid;

        grid-template-columns: 1fr 1fr;

        gap: 30px;
      }

      .left-panel,
      .right-panel {
        background: #fff;

        border-radius: 15px;

        padding: 25px;

        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .camera-box {
        width: 100%;

        height: 350px;

        background: #000;

        border-radius: 15px;

        overflow: hidden;

        display: flex;

        justify-content: center;

        align-items: center;
      }

      #video {
        width: 100%;

        height: 100%;

        object-fit: cover;
      }

      .camera-buttons {
        margin-top: 20px;

        display: flex;

        justify-content: center;

        gap: 15px;

        flex-wrap: wrap;
      }

      .camera-buttons button {
        min-width: 180px;
      }

      .question-box {
        margin-top: 20px;

        padding: 20px;

        background: #f5f5f5;

        border-radius: 12px;

        font-size: 20px;

        min-height: 100px;
      }

      #answer {
        width: 100%;

        height: 170px;

        margin-top: 20px;

        padding: 15px;

        font-size: 16px;

        border-radius: 10px;

        border: 1px solid #ccc;

        resize: none;

        box-sizing: border-box;
      }

      .button-group {
        display: flex;

        justify-content: center;

        gap: 15px;

        flex-wrap: wrap;

        margin-top: 20px;
      }

      .button-group button {
        min-width: 180px;
      }

      .timer {
        font-size: 20px;

        font-weight: bold;
      }

      @media (max-width: 900px) {
        .interview-container {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <nav class="navbar">
        <div class="logo">
          <i class="fa-solid fa-robot"></i>

          AI Interview Platform
        </div>

        <div class="timer">
          ⏱ Time Left :

          <span id="time"> 10:00 </span>
        </div>
      </nav>
    </header>

    <section class="interview-container">
      <div class="left-panel">
        <h2 style="text-align: center">Camera Preview</h2>

        <div class="camera-box">
          <video id="video" autoplay playsinline></video>
        </div>

        <div class="camera-buttons">
          <button id="startCamera">
            <i class="fa-solid fa-video"></i>

            Start Camera
          </button>

          <button id="startMic">
            <i class="fa-solid fa-microphone"></i>

            Start Mic
          </button>
        </div>
      </div>

      <div class="right-panel">
        <h2 style="text-align: center">Interview Question</h2>

        <div class="question-box">
          <p id="question">
            Click "Generate Question" to start your AI Interview.
          </p>
        </div>

        <div style="text-align: center; margin-top: 20px">
          <button id="generateQuestion">🤖 Generate Question</button>
        </div>

        <textarea
          id="answer"
          placeholder="Type your answer here or answer using your microphone..."
        ></textarea>

        <div class="button-group">
          <button id="nextQuestion">Next Question</button>

          <button id="finishInterview">Finish Interview</button>
        </div>
      </div>
    </section>

    <footer>
      <p>© 2026 AI Interview Platform</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
